# UVM Generator v1.2 配置文件 - AHB2APB Demo
# 测试增强后的模板功能
# 规范：interface 和 item 命名与 agent 类型名一致
#   ahb_master_agent -> ahb_master_if, ahb_master_item
#   apb_slave_agent  -> apb_slave_if, apb_slave_item

output_dir: /home/IC_verify/script/uvm_gen/demo_ahb2apb

rtl:
  top_file: "/home/IC_verify/project/claude_prj/prj3_ahb2qpb/rtl/ahb2apb.v"
  top_module: "ahb2apb"
  flist: "/home/IC_verify/project/claude_prj/prj3_ahb2qpb/rtl.f"

testbench:
  name: tb_top
  timescale: "1ns/1ps"
  dut_instance: "DUT"

test:
  base_name: tc_base_test
  sanity_name: tc_sanity

env:
  name: ahb2apb_env
  has_coverage: true
  has_scoreboard: true
  has_ref_model: true

cfg:
  name: top_cfg
  fields:
    - { name: is_active, type: int, rand: false }
    - { name: scb_en, type: int, rand: false }

# ============================================================
# Agent Types (命名规范: xxx_agent 对应 xxx_if 和 xxx_item)
# ============================================================
agent_types:
  ahb_master:
    interface: ahb_master_if
    item: ahb_master_item
    mode: active
  apb_slave:
    interface: apb_slave_if
    item: apb_slave_item
    mode: active

# ============================================================
# Agent Instances
# ============================================================
agents:
  ahb_master: [ahb_mst]
  apb_slave: [apb_slv0(type_role=out), apb_slv1(type_role=out), apb_slv2(type_role=out), apb_slv3(type_role=out), apb_slv4(type_role=out), apb_slv5(type_role=out), apb_slv6(type_role=out), apb_slv7(type_role=out), apb_slv8(type_role=out)]

# ============================================================
# Transaction Items (命名与 agent 类型一致)
# ============================================================
items:
  - name: ahb_master_item
    fields:
      - { name: addr, type: "logic[31:0]", rand: true }
      - { name: data, type: "logic[31:0]", rand: true }
      - { name: trans, type: "logic[1:0]", rand: true }
      - { name: write, type: logic, rand: true }
    constraints:
      - { name: trans_c, expr: "trans inside {[0:3]}" }

  - name: apb_slave_item
    fields:
      - { name: addr, type: "logic[31:0]", rand: false }
      - { name: data, type: "logic[31:0]", rand: false }
      - { name: write, type: logic, rand: false }
      - { name: strb, type: "logic[3:0]", rand: false }
      - { name: slverr, type: logic, rand: false }
      - { name: slave_id, type: "logic[3:0]", rand: false }

# ============================================================
# Interfaces (命名与 agent 类型一致)
# ============================================================
interfaces:
  ahb_master_if:
    clock: hclk
    clk_period: 10ns
    reset: hreset_n
    signals:
      # AHB Master 输入信号 (TB 驱动)
      hsel: o1
      haddr: o32
      htrans: o2
      hwdata: o32
      hwrite: o1
      # AHB Master 输出信号 (TB 采样)
      hrdata: i32
      hready: i1
      hresp: i2

  apb_slave_if:
    clock: hclk
    clk_period: 10ns
    reset: hreset_n
    signals:
      # APB 公共信号 (DUT -> TB monitor)
      paddr: i32
      penable: i1
      pwrite: i1
      pwdata: i32
      # APB Slave 信号 (TB 驱动响应)
      pready: o1
      prdata: o32
      pslverr: o1

# ============================================================
# Reference Model
# ============================================================
ref_model:
  name: ahb2apb_ref_model
  input_item: [ahb_master_item]
  predicted_type: [apb_slave_item]

# ============================================================
# Scoreboard
# ============================================================
scoreboard:
  name: ahb2apb_scoreboard
  actual_type: [apb_slave_item]
  expected_type: [apb_slave_item]
  compare_method: "full_compare"

# ============================================================
# Coverage
# ============================================================
coverage:
  name: ahb2apb_coverage
  groups:
    - name: ahb_cov
      interface: [ahb_master_if, hclk, hreset_n]
      coverpoints:
        - name: addr_cp
          expr: "haddr"
          bins:
            - { name: slave0, values: "{[0:'h0FFF]}" }
            - { name: slave1, values: "{['h1000:'h1FFF]}" }
            - { name: other, values: "default" }
        - name: trans_cp
          expr: "htrans"
          bins:
            - { name: idle, values: "{0}" }
            - { name: busy, values: "{1}" }
            - { name: nonseq, values: "{2}" }
            - { name: seq, values: "{3}" }
        - name: write_cp
          expr: "hwrite"
          bins:
            - { name: read, values: "{0}" }
            - { name: write, values: "{1}" }
      crosses:
        - name: addr_x_write
          points: [addr_cp, write_cp]

    - name: apb_cov
      interface: [apb_slave_if, hclk, hreset_n]
      coverpoints:
        - name: pwrite_cp
          expr: "pwrite"
          bins:
            - { name: read, values: "{0}" }
            - { name: write, values: "{1}" }
        - name: penable_cp
          expr: "penable"
          bins:
            - { name: setup, values: "{0}" }
            - { name: access, values: "{1}" }
