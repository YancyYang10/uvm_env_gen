# UVM Generator v1.2 配置文件
# 基于 rtl/ahb2apb.v 自动生成 UVM 验证环境

output_dir: /home/IC_verify/script/uvm_gen_v1.2/demo

rtl:
  top_file: "/home/IC_verify/script/uvm_gen_v1.2/rtl/ahb2apb.v"
  top_module: "ahb2apb"
  flist: "/home/IC_verify/script/uvm_gen_v1.2/rtl/rtl.f"

testbench:
  name: tb_top
  timescale: "1ns/1ps"
  dut_instance: "DUT"

test:
  base_name: tc_base_test
  sanity_name: tc_sanity

env:
  name: ahb2apb_env
  has_coverage: true
  has_scoreboard: true
  has_ref_model: true

cfg:
  name: top_cfg
  fields:
    - { name: is_active, type: int, rand: false }
    - { name: scb_en, type: int, rand: false }

# ============================================================
# Agents: AHB Master (active) + APB Monitor (passive)
# ============================================================
agents:
  - name: ahb_master
    mode: active
    type: in
    interface: ahb_if
    item: ahb_item

  - name: apb_monitor
    mode: passive
    type: out
    interface: apb_if
    item: apb_item

# ============================================================
# Transaction Items
# ============================================================
items:
  - name: ahb_item
    fields:
      - { name: addr, type: "logic[31:0]", rand: true }
      - { name: data, type: "logic[31:0]", rand: true }
      - { name: trans, type: "logic[1:0]", rand: true }
      - { name: write, type: logic, rand: true }
    constraints:
      - { name: trans_c, expr: "trans inside {[0:3]}" }

  - name: apb_item
    fields:
      - { name: paddr, type: "logic[31:0]", rand: false }
      - { name: pwdata, type: "logic[31:0]", rand: false }
      - { name: prdata, type: "logic[31:0]", rand: false }
      - { name: pwrite, type: logic, rand: false }
      - { name: psel, type: "logic[8:0]", rand: false }

# ============================================================
# Interfaces (基于 ahb2apb.v 端口定义)
# ============================================================
interfaces:
  - name: ahb_if
    clock: hclk
    clk_period: 10ns
    reset: hreset_n
    signals:
      # AHB Master 输入信号 (TB 驱动)
      - { name: hsel, type: logic, dir: output }
      - { name: haddr, type: "logic[31:0]", dir: output }
      - { name: htrans, type: "logic[1:0]", dir: output }
      - { name: hwdata, type: "logic[31:0]", dir: output }
      - { name: hwrite, type: logic, dir: output }
      # AHB Master 输出信号 (TB 采样)
      - { name: hrdata, type: "logic[31:0]", dir: input }
      - { name: hready, type: logic, dir: input }
      - { name: hresp, type: "logic[1:0]", dir: input }

  - name: apb_if
    clock: hclk          # APB 与 AHB 共用时钟
    clk_period: 10ns
    reset: hreset_n
    signals:
      # APB 输出信号 (DUT -> TB monitor)
      - { name: paddr, type: "logic[31:0]", dir: input }
      - { name: penable, type: logic, dir: input }
      - { name: pwrite, type: logic, dir: input }
      - { name: pwdata, type: "logic[31:0]", dir: input }
      - { name: psel, type: "logic[8:0]", dir: input }
      # APB 输入信号 (TB 驱动 slave 响应)
      - { name: pready, type: "logic[8:0]", dir: output }
      - { name: prdata, type: "logic[31:0]", dir: output }

# ============================================================
# Reference Model
# ============================================================
ref_model:
  name: ahb2apb_ref_model
  input_item: [ahb_item]
  predicted_type: [apb_item]

# ============================================================
# Scoreboard
# ============================================================
scoreboard:
  name: ahb2apb_scoreboard
  actual_type: [apb_item]
  expected_type: [apb_item]
  compare_method: "byte_compare"
  error_tolerance: 0

# ============================================================
# Coverage
# ============================================================
coverage:
  name: ahb2apb_coverage
  groups:
    - name: ahb_cov
      interface: [ahb_if, hclk, hreset_n]
      coverpoints:
        - name: addr_cp
          expr: "haddr"
          bins:
            - { name: low, values: "{[0:'h0FFF]}" }
            - { name: mid, values: "{['h1000:'hFFFF]}" }
            - { name: high, values: "{['h10000:$]}" }
        - name: trans_cp
          expr: "htrans"
          bins:
            - { name: idle, values: "{0}" }
            - { name: busy, values: "{1}" }
            - { name: nonseq, values: "{2}" }
            - { name: seq, values: "{3}" }
        - name: write_cp
          expr: "hwrite"
          bins:
            - { name: read, values: "{0}" }
            - { name: write, values: "{1}" }
      crosses:
        - name: addr_x_write
          points: [addr_cp, write_cp]

    - name: apb_cov
      interface: [apb_if, hclk, hreset_n]
      coverpoints:
        - name: paddr_cp
          expr: "paddr"
          bins:
            - { name: low, values: "{[0:'h0FFF]}" }
            - { name: high, values: "{['h1000:$]}" }
        - name: psel_cp
          expr: "psel"
          bins:
            - { name: slave0, values: "{9'b000000001}" }
            - { name: slave1, values: "{9'b000000010}" }
            - { name: others, values: "default" }